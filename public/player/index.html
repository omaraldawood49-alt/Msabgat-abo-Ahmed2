<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>المشارك — لعبة الأفخاخ</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%93%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    .wrap { max-width: 560px; margin: 0 auto; padding: 0 12px 40px; }
    /* شاشة الدخول */
    .join { max-width: 380px; margin: 60px auto; padding: 28px 24px; text-align: center; }
    .join h1 { font-size: 24px; }
    .join-emoji { font-size: 46px; margin: 6px 0; }
    .name-input { text-align: center; font-size: 22px; font-weight: 800; }
    /* رأس ثابت */
    .phead { position: sticky; top: 0; z-index: 20; background: var(--fest); color: #fff; padding: 12px 14px; box-shadow: 0 6px 18px rgba(80,60,180,.22); }
    .phead-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .gname { font-weight: 800; font-size: 17px; color: #fff; }
    .phead .muted { color: rgba(255,255,255,.8); }
    .score-box { text-align: left; }
    .score-box .lbl { font-size: 11px; color: rgba(255,255,255,.8); }
    .score-box .val { font-size: 22px; font-weight: 800; color: #ffe08a; }
    .status-line { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 13px; color: rgba(255,255,255,.85); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-inline-end: 5px; background: rgba(255,255,255,.5); }
    .open .live-dot { background: #3dffb0; box-shadow: 0 0 8px #3dffb0; animation: pulse 1.4s infinite; }
    @keyframes pulse { 50% { opacity: .35; } }

    .qcard { margin-top: 14px; padding: 16px; text-align: center; }
    .qcard .qcat { font-size: 12px; color: var(--text-dim); font-weight: 700; }
    .qcard .qtext { font-size: 19px; font-weight: 800; margin: 6px 0 4px; line-height: 1.4; }
    .qcard .qtimer { font-size: 15px; font-weight: 800; color: var(--accent-2); }
    .qhint { font-size: 13px; margin-top: 6px; }
    .lie-box { margin-top: 14px; }
    .lie-hint { font-size: 14px; color: var(--text-dim); margin-bottom: 10px; text-align: center; }
    .lie-input { text-align: center; font-size: 18px; font-weight: 700; padding: 14px; }
    .lie-status { margin-top: 10px; }

    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    .opts.cols1 { grid-template-columns: 1fr; }
    .opt-btn {
      border: none; border-radius: 16px; color: #fff; background: var(--opt);
      padding: 20px 14px; font-size: 18px; font-weight: 800; font-family: inherit;
      display: flex; align-items: center; gap: 12px; text-align: start; cursor: pointer;
      min-height: 84px; box-shadow: 0 6px 16px rgba(0,0,0,.16); transition: transform .08s, opacity .2s, filter .2s;
    }
    .opt-btn .shape { font-size: 22px; flex: 0 0 auto; }
    .opt-btn .otext { flex: 1; }
    .opt-btn:active { transform: scale(.97); }
    .opt-btn:disabled { cursor: default; }
    .opt-btn.chosen { outline: 4px solid #fff; }
    .opt-btn.dimmed { opacity: .4; filter: grayscale(.4); }
    .opt-btn.correct { outline: 4px solid #063; box-shadow: 0 0 22px rgba(45,229,157,.6); }

    .banner { text-align: center; padding: 14px; border-radius: 12px; margin: 16px 0; font-weight: 700; }
    .banner-wait { background: var(--flat-bg); color: var(--flat); }
    .feedback { text-align: center; padding: 20px; border-radius: 16px; margin-top: 16px; font-weight: 800; }
    .feedback.ok { background: var(--up-bg); color: var(--up); }
    .feedback.no { background: var(--down-bg); color: var(--down); }
    .feedback .big { font-size: 30px; display: block; }
    .feedback .pts { font-size: 20px; color: var(--accent); margin-top: 6px; }
    .waitscreen { text-align: center; padding: 34px 18px; }
    .waitscreen .emoji { font-size: 52px; }
    .waitscreen h2 { font-size: 22px; margin: 8px 0; }
    .rankpill { display: inline-block; background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; font-weight: 800; margin-top: 10px; }
    .sound-toggle { background: transparent; border: none; font-size: 20px; cursor: pointer; }
    .listen-card { text-align: center; }
    .listen-emoji { font-size: 44px; margin-bottom: 4px; }
    .room-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  </style>
</head>
<body>
  <!-- شاشة الدخول -->
  <div id="joinScreen">
    <div class="panel join">
      <div class="brand center" style="justify-content:center; margin-bottom:6px;"><span class="dot"></span> لعبة الأفخاخ</div>
      <div class="join-emoji">🙌</div>
      <h1>اكتب اسم مجموعتك</h1>
      <p class="muted" style="margin-top:-6px;">ثم اضغط «دخول» وانتظر بدء المضيف</p>
      <div class="field" style="margin-top:18px;">
        <input id="nameInput" class="name-input" maxlength="24" placeholder="مثال: النمور 🐯" autocomplete="off" />
      </div>
      <button id="joinBtn" class="btn btn-accent btn-block" style="font-size:18px; padding:14px;">🚀 دخول</button>
      <div class="room-label" id="roomLabel"></div>
      <p id="joinErr" class="down" style="min-height:18px; margin-top:12px; font-size:14px;"></p>
    </div>
  </div>

  <!-- شاشة اللعب -->
  <div id="gameScreen" class="hidden">
    <div class="phead">
      <div class="phead-row">
        <div>
          <div class="gname" id="gName">—</div>
          <div class="muted" id="compName" style="font-size:12px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button id="soundBtn" class="sound-toggle" title="الصوت">🔊</button>
          <div class="score-box">
            <div class="lbl">نقاطك</div>
            <div class="val mono" id="gScore">0</div>
          </div>
        </div>
      </div>
      <div class="status-line" id="statusLine">
        <span><span class="live-dot"></span><span id="statusText">بانتظار البدء</span></span>
        <span id="qInfo" class="mono"></span>
      </div>
    </div>

    <div class="wrap">
      <div id="content"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/sound.js"></script>
  <script src="/shared/util.js"></script>
  <script src="/player/player.js"></script>
</body>
</html>
