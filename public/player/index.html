<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>المتسابق — منافسة الأسهم</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    .wrap { max-width: 560px; margin: 0 auto; padding: 0 12px 90px; }
    /* شاشة الدخول */
    .join { max-width: 380px; margin: 60px auto; padding: 28px 24px; text-align: center; }
    .join h1 { font-size: 24px; }
    .code-input { text-align: center; letter-spacing: 8px; font-size: 26px; font-weight: 800; text-transform: uppercase; }
    /* رأس ثابت */
    .phead { position: sticky; top: 0; z-index: 20; background: linear-gradient(180deg, var(--bg-2), rgba(11,18,32,.92)); border-bottom: 1px solid var(--border); padding: 12px 14px; backdrop-filter: blur(6px); }
    .phead-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .gname { font-weight: 800; font-size: 17px; }
    .cash-box { text-align: left; }
    .cash-box .lbl { font-size: 11px; color: var(--text-dim); }
    .cash-box .val { font-size: 20px; font-weight: 800; color: var(--accent); }
    .status-line { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 13px; color: var(--text-dim); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-inline-end: 5px; }
    .open .live-dot { background: var(--up); box-shadow: 0 0 8px var(--up); animation: pulse 1.4s infinite; }
    .closed .live-dot { background: var(--down); }
    @keyframes pulse { 50% { opacity: .35; } }

    .stock-card { padding: 13px 14px; margin-top: 10px; }
    .sc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .sc-name { font-weight: 700; font-size: 16px; }
    .sc-owned { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
    .sc-price { text-align: left; }
    .sc-price .p { font-size: 19px; font-weight: 800; }
    .sc-actions { display: grid; grid-template-columns: 74px 1fr 1fr; gap: 8px; margin-top: 11px; align-items: center; }
    .qty-input { text-align: center; padding: 9px 4px; font-weight: 700; }
    .banner { text-align: center; padding: 10px; border-radius: 10px; margin: 12px 0; font-weight: 700; }
    .banner-wait { background: var(--flat-bg); color: var(--flat); }
    .sound-toggle { background: transparent; border: none; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- شاشة الدخول -->
  <div id="joinScreen">
    <div class="panel join">
      <div class="brand center" style="justify-content:center; margin-bottom:6px;"><span class="dot"></span> منافسة الأسهم</div>
      <h1>دخول المتسابق</h1>
      <p class="muted" style="margin-top:-6px;">أدخل كود المجموعة أو امسح رمز QR</p>
      <div class="field" style="margin-top:18px;">
        <input id="codeInput" class="code-input" maxlength="6" placeholder="• • • • •" autocomplete="off" />
      </div>
      <button id="joinBtn" class="btn btn-accent btn-block">دخول</button>
      <p id="joinErr" class="down" style="min-height:18px; margin-top:12px; font-size:14px;"></p>
    </div>
  </div>

  <!-- شاشة التداول -->
  <div id="gameScreen" class="hidden">
    <div class="phead">
      <div class="phead-row">
        <div>
          <div class="gname" id="gName">—</div>
          <div class="muted" id="compName" style="font-size:12px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          <button id="soundBtn" class="sound-toggle" title="الصوت">🔊</button>
          <div class="cash-box">
            <div class="lbl">النقد المتاح</div>
            <div class="val mono" id="gCash">0</div>
          </div>
        </div>
      </div>
      <div class="status-line" id="statusLine">
        <span><span class="live-dot"></span><span id="statusText">بانتظار البدء</span></span>
        <span id="roundInfo" class="mono"></span>
      </div>
    </div>

    <div class="wrap">
      <div id="banner" class="banner banner-wait hidden"></div>
      <div id="stockList"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/sound.js"></script>
  <script src="/shared/util.js"></script>
  <script src="/player/player.js"></script>
</body>
</html>
