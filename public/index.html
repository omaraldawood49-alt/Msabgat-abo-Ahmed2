<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مسابقة الأسئلة</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%93%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    .hub { max-width: 880px; margin: 0 auto; padding: 40px 20px; }
    .hero { text-align: center; margin-bottom: 34px; }
    .hero h1 { font-size: 34px; }
    .hero .dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 16px var(--accent); margin-inline-start: 8px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
    .card { padding: 26px 22px; text-align: center; text-decoration: none; color: var(--text); display: block; transition: transform .12s ease, border-color .15s; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent-2); }
    .card .ico { font-size: 42px; margin-bottom: 10px; }
    .card h3 { font-size: 20px; }
    .card p { color: var(--text-dim); font-size: 14px; margin: 6px 0 0; }
  </style>
</head>
<body>
  <div class="hub">
    <div class="hero">
      <h1>مسابقة الألغام 💣 <span class="dot"></span></h1>
      <p class="muted">لعبة أسئلة جماعية: اصنع لغمًا للبقية وأصِب الصحيح! — شاشة عرض، شاشة مقدّم، وجوال لكل مجموعة</p>
    </div>
    <div class="cards">
      <a class="panel card" href="/display">
        <div class="ico">📺</div>
        <h3>شاشة العرض</h3>
        <p>للبروجكتر — السؤال والمؤقّت والترتيب</p>
      </a>
      <a class="panel card" href="/admin">
        <div class="ico">🎛️</div>
        <h3>شاشة المقدّم</h3>
        <p>إدارة الأسئلة والمجموعات والتحكم الكامل</p>
      </a>
      <a class="panel card" href="/player">
        <div class="ico">📱</div>
        <h3>جوال المجموعة</h3>
        <p>الدخول بالكود أو QR والإجابة</p>
      </a>
    </div>
  </div>
</body>
</html>
