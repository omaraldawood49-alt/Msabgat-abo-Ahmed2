<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شاشة العرض — بورصة رواحل</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/display/display.css" />
</head>
<body>
  <!-- طبقة البدء (لتفعيل الصوت) -->
  <div id="startOverlay" class="overlay">
    <div class="overlay-inner">
      <div class="brand" style="font-size:30px; justify-content:center;"><span class="dot"></span> بورصة رواحل</div>
      <p class="muted">شاشة العرض الرئيسية</p>
      <button id="startBtn" class="btn btn-accent" style="font-size:18px; padding:14px 34px; margin-top:14px;">▶ بدء العرض</button>
    </div>
  </div>

  <!-- الرأس -->
  <header class="dhead">
    <div class="dhead-title">
      <div class="brand"><span class="dot"></span> <span id="compName">بورصة رواحل</span></div>
      <div class="market-status" id="marketStatus"><span class="live-dot"></span><span id="statusText">بانتظار البدء</span></div>
    </div>
    <div class="dhead-round">
      <div class="lock-chip">🔒 يظهر ترتيب الفرق في الختام</div>
      <div class="round-box">
        <div class="round-num">الجولة <span id="roundNum">—</span><span class="round-total" id="roundTotal"></span></div>
      </div>
      <div class="countdown">
        <svg viewBox="0 0 120 120" class="ring">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52" />
        </svg>
        <div class="ring-time mono" id="ringTime">0</div>
      </div>
    </div>
  </header>

  <!-- شبكة الأسهم الزجاجية -->
  <main class="glass-main">
    <div id="stockGrid" class="glass-grid"></div>
  </main>

  <!-- شريط الأخبار -->
  <footer class="newsbar">
    <div class="news-label">أخبار السوق</div>
    <div class="news-viewport"><div id="newsTrack" class="news-track"></div></div>
  </footer>

  <!-- طبقة الانتقال بين الجولات -->
  <div id="transitionOverlay" class="overlay trans hidden">
    <div class="trans-inner">
      <div id="countBig" class="count-big"></div>
      <div id="transMsg" class="trans-msg"></div>
    </div>
  </div>

  <!-- طبقة التتويج النهائية -->
  <div id="podiumOverlay" class="overlay hidden">
    <div class="podium-wrap">
      <h1 class="podium-title">🏆 نتائج بورصة رواحل النهائية</h1>
      <div id="podium" class="podium"></div>
      <div id="podiumRest" class="podium-rest"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/sound.js"></script>
  <script src="/shared/util.js"></script>
  <script src="/display/display.js"></script>
</body>
</html>
