# Render Blueprint — نشر تلقائي لبورصة الأسهم
# ارفع المشروع بضغطة واحدة: من render.com اختر New + → Blueprint → هذا المستودع.
services:
  - type: web
    name: msabgat-alashum
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: "20"
