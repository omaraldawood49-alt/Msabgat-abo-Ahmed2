# Render Blueprint — نشر تلقائي لمسابقة الأسئلة
# ارفع المشروع بضغطة واحدة: من render.com اختر New + → Blueprint → هذا المستودع.
services:
  - type: web
    name: msabgat-asila
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      # لا يوجد رمز دخول — شاشة المقدّم تفتح مباشرة.
      # (لتفعيل رمز سري لاحقًا: أضِف متغيّر ADMIN_PIN بقيمة سرية في إعدادات الخدمة.)
      - key: NODE_VERSION
        value: "20"
